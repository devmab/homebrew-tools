name: Update Homebrew Solo Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New Solo version (e.g. 0.50.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "New Solo version (e.g. 0.50.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-formula:
    runs-on: hl-hbt-lin-md
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Import GPG Key
        uses: step-security/ghaction-import-gpg@c86c374c0659a6c2d1284bccf8af889e73ce8fe0 # v6.3.0
        id: gpg_key
        with:
          git_config_global: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}

      - name: Update Homebrew solo formula
        env:
          NEW_VERSION: ${{ inputs.version || github.event.inputs.version }}
        run: bash .github/scripts/update-solo-formula.sh

      - name: Commit Version Changes
        id: git-commit
        uses: step-security/add-and-commit@c02fc48d1a9e30e6955e3c170b06c51ceb2d26df # v9.1.5
        with:
          author_name: ${{ vars.GIT_USER_NAME || steps.gpg_key.outputs.name }}
          author_email: ${{ vars.GIT_USER_EMAIL || steps.gpg_key.outputs.email }}
          committer_name: ${{ vars.GIT_USER_NAME || steps.gpg_key.outputs.name }}
          committer_email: ${{ vars.GIT_USER_EMAIL || steps.gpg_key.outputs.email }}
          commit: --signoff --gpg-sign
          message: "chore: bump solo Homebrew formula to ${{ inputs.version || github.event.inputs.version }}"
          new_branch: chore/bump-solo-homebrew-${{ inputs.version || github.event.inputs.version }}

      - name: Create pull request
        if: steps.git-commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          VERSION: ${{ inputs.version || github.event.inputs.version }}
        run: |
          PR_BODY="This pull request was created automatically by the **Update Homebrew Solo Formula** workflow.
          Requested version: \`${VERSION}\`."
          gh pr create \
            --base main \
            --head "chore/bump-solo-homebrew-${VERSION}" \
            --title "chore: bump solo Homebrew formula to ${VERSION}" \
            --body "${PR_BODY}"
